<!DOCTYPE html>
<html>

<head>

<title>AI Multilingual Translator</title>

<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js"></script>

</head>

<body>

<div class="app-container">

<h1 class="title glow-text">
✨ AI Multilingual Translator ✨
</h1>

<form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

<div class="translator-grid">

<div class="panel input-panel">

<h3>Enter Text</h3>

<textarea name="text" placeholder="Type English text here..."></textarea>

<div class="upload-section">

<label>Upload File</label>
<input type="file" name="file">

<label>Upload Image</label>
<input type="file" name="image">

</div>

</div>

<div class="panel output-panel">

<h3>Translated Output</h3>

<div id="translatedText" class="output-box">

{{translation}}

</div>

<button type="button" onclick="copyText()" class="copy-btn">
Copy Translation
</button>

</div>

</div>

<div class="controls">

<select name="language">

{% for name, code in languages.items() %}
<option value="{{code}}">{{name}}</option>
{% endfor %}

</select>

<button type="submit" class="translate-btn">
Translate
</button>

</div>

</form>

<div id="loader" class="loader">
Translating...
</div>

</div>

</body>

</html>
